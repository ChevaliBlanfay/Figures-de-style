    <script>

            // SECTION I (1-20)
            { num: 1, title: "La Métaphore", subtitle: "Comparaison implicite", definition: "Comparaison entre deux éléments sans termes de comparaison (comme, tel que).", role: "Crée des images poétiques, enrichit l'expression, rend abstraits les concepts concrets", examples: ["La vie est une montagne à gravir", "Son cœur est une forêt dense et mystérieuse", "Le temps est un fleuve qui s'écoule sans cesse"], section: "1-20", icon: "🎨" },
            { num: 2, title: "La Comparaison", subtitle: "Ressemblance explicite", definition: "Rapprochement de deux réalités au moyen d'un outil de comparaison (comme, tel que).", role: "Facilite la compréhension, clarifie les idées, crée des images visuelles", examples: ["Blanc comme la neige", "Doux comme le miel", "Courageux comme un lion"], section: "1-20", icon: "⚖️" },
            { num: 3, title: "La Personnification", subtitle: "Humanisation", definition: "Attribution de qualités humaines à des choses, des animaux ou des abstractions.", role: "Anime le texte, rend vivant ce qui ne l'est pas, crée l'empathie", examples: ["La nuit enveloppe la ville de son silence", "Le vent danse dans les branches", "La mort a frappé à sa porte"], section: "1-20", icon: "👤" },
            { num: 4, title: "L'Allitération", subtitle: "Répétition de consonnes", definition: "Répétition du même son consonantique au début de mots rapprochés.", role: "Crée une musicalité, renforce l'impact émotionnel, facilite la mémorisation", examples: ["Pour qui sont ces serpents qui sifflent sur vos têtes?", "Trois tigres trottaient dans le tigre", "Christian le cœur content courait"], section: "1-20", icon: "🔊" },
            { num: 5, title: "L'Assonance", subtitle: "Répétition de voyelles", definition: "Répétition du même son vocalique à l'intérieur de mots rapprochés.", role: "Produit une harmonie musicale, crée une atmosphère, souligne certains mots", examples: ["Les anges dans nos campagnes", "Elle crée une atmosféra de drame", "En été, les blés ondulent au vent"], section: "1-20", icon: "🎵" },
            { num: 6, title: "L'Hyperbole", subtitle: "Exagération intentionnelle", definition: "Exagération extrême d'une idée pour frapper l'imagination.", role: "Amplifie l'expression, crée un effet comique ou dramatique, attire l'attention", examples: ["Je meurs de faim, je meurs d'amour", "Il l'a dit mille fois", "J'ai traversé des montagnes de difficultés"], section: "1-20", icon: "📈" },
            { num: 7, title: "L'Oxymore", subtitle: "Association paradoxale", definition: "Rapprochement de deux termes contradictoires qui créent une relation paradoxale.", role: "Exprime des nuances complexes, crée une tension poétique, choque pour interpeller", examples: ["Une obscurité lumineuse", "Un bruit silencieux", "Une triste joie"], section: "1-20", icon: "😵" },
            { num: 8, title: "L'Antithèse", subtitle: "Opposition de termes", definition: "Mise en opposition de deux idées, sentiments ou objets contraires.", role: "Souligne les contrastes, crée du relief, facilite la réflexion philosophique", examples: ["C'est la plus belle des guerres, la plus terrifiante des paix", "Il est fort et faible à la fois", "Je t'aime et je te hais"], section: "1-20", icon: "⚔️" },
            { num: 9, title: "L'Énumération", subtitle: "Accumulation de termes", definition: "Accumulation de termes ou de propositions de même nature pour créer un effet.", role: "Crée une accumulation, amplifie l'expression, accélère le rythme", examples: ["Pluies, neiges, tempêtes, tornades dévastaient les plaines", "Je vois la beauté partout: dans les fleurs, les étoiles, les sourires", "Courir, danser, rire, vivre!"], section: "1-20", icon: "📝" },
            { num: 10, title: "L'Pléonasme", subtitle: "Redondance expressive", definition: "Répétition de mots ou d'idées pour renforcer l'expression.", role: "Renforce l'expression, crée une intensité, marque l'importance", examples: ["Je l'ai vu de mes propres yeux", "Monter en haut, descendre en bas", "Entendre de ses oreilles"], section: "1-20", icon: "🔁" },

            { num: 12, title: "L'Ironie", subtitle: "Contraste entre apparence et réalité", definition: "Expression où le sens réel est l'inverse du sens apparent.", role: "Crée de l'humour, critique discrètement, invite à la réflexion", examples: ["'Quel génie!' (pour quelqu'un qui vient de faire une bêtise)", "Bravo pour ce chef-d'œuvre!", "Tu es vraiment discret!"], section: "1-20", icon: "😏" },
            { num: 13, title: "La Synecdoque", subtitle: "Substitution partielle", definition: "Figure où on prend la partie pour le tout ou le tout pour la partie.", role: "Crée une expression concise, change la perspective, enrichit le style", examples: ["Avoir 300 âmes dans la maison (au lieu de 300 personnes)", "C'est un grand cœur", "Tous les bras se levèrent"], section: "1-20", icon: "🔄" },
            { num: 14, title: "La Métonymie", subtitle: "Substitution de mots", definition: "Substitution d'un mot par un autre qui lui est associé par une relation logique.", role: "Enrichit l'expression, crée des associations d'idées, abrège le discours", examples: ["Boire un verre (au lieu de boire ce qui est dans le verre)", "Lire Molière (au lieu de lire l'œuvre de Molière)", "Les Bleus ont gagné le match"], section: "1-20", icon: "🔀" },
            { num: 15, title: "L'Antonomase", subtitle: "Substitution de noms", definition: "Emploi du nom propre pour désigner un type, une qualité.", role: "Crée une expression frappante, enrichit le vocabulaire, évite la répétition", examples: ["C'est un Napoléon (pour un homme de pouvoir)", "C'est une Jeanne d'Arc moderne", "Il se prend pour un Casanova"], section: "1-20", icon: "👑" },
            { num: 16, title: "La Périphrase", subtitle: "Détour d'expression", definition: "Emploi de plusieurs mots pour exprimer ce qu'on pourrait dire en un seul.", role: "Crée de la poésie, enrichit l'expression, crée du suspense", examples: ["L'astre du jour (pour le soleil)", "La reine de la nuit (pour la lune)", "Le roi des animaux (pour le lion)"], section: "1-20", icon: "🌟" },

            { num: 19, title: "L'Zeugme", subtitle: "Double construction", definition: "Mot employé dans deux sens différents ou avec deux constructions différentes.", role: "Crée un effet d'humour, attire l'attention, enrichit l'expression", examples: ["Elle laissa tomber ses gants et sa dignité", "Armé de patience et de courage", "Il fit un héros et une belle sortie"], section: "1-20", icon: "🎯" },
            { num: 20, title: "L'Aposiopèse", subtitle: "Interruption volontaire", definition: "Interruption volontaire du discours avant son achèvement.", role: "Crée du suspense, laisse imaginer, renforce l'émotion", examples: ["Si vous faites ça, je... (silence suggestif)", "Je n'ose pas dire ce que...", "Il était sur le point de..."], section: "1-20", icon: "⏸️" },

            // SECTION II (21-40)
            { num: 21, title: "L'Anaphore", subtitle: "Répétition initiale", definition: "Répétition du même mot ou groupe de mots au début de propositions successives.", role: "Crée un rythme, amplifie l'expression, marque l'insistance", examples: ["Et la fleur et l'astre et le vent", "Non, je ne baisserai pas la tête, non, je ne renoncerai pas", "Je veux, je peux, je dois réussir"], section: "21-40", icon: "🔝" },
            { num: 22, title: "L'Épiphore", subtitle: "Répétition finale", definition: "Répétition du même mot ou groupe de mots à la fin de propositions successives.", role: "Crée un rythme, facilite la mémorisation, crée de l'harmonie", examples: ["Je viens pour te voir, pour t'aider, pour t'aimer", "Silence après silence, attente après attente", "Il faut vivre pour aimer, aimer pour vivre"], section: "21-40", icon: "🔚" },
            { num: 23, title: "Le Chiasme", subtitle: "Inversion croisée", definition: "Répétition de structures syntaxiques dans un ordre inversé.", role: "Crée une symétrie, marque l'équilibre, facilite la mémorisation", examples: ["Il faut manger pour vivre et non vivre pour manger", "Demander d'abord, puis donner ensuite", "Je travaille pour vivre, elle vit pour travailler"], section: "21-40", icon: "🔄" },
            { num: 24, title: "L'Énallage", subtitle: "Changement de perspective", definition: "Emploi d'une partie du discours à la place d'une autre.", role: "Crée une originalité stylistique, change la perspective, enrichit l'expression", examples: ["Du courage! (nom au lieu de l'adjectif courageux)", "Un rouge éclatant (adjectif devenant un nom)", "Il court vite les chevaux (verbe utilisé comme adjectif)"], section: "21-40", icon: "🔀" },

            { num: 26, title: "L'Énumération Graduelle", subtitle: "Accumulation progressive", definition: "Énumération de termes s'amplifiant progressivement en intensité.", role: "Crée une progression, amplifie l'effet, prépare le point culminant", examples: ["Il marche, il court, il vole!", "Une tristesse, un désespoir, un néant absolu", "Simple, beau, magnifique, divin!"], section: "21-40", icon: "📈" },
            { num: 27, title: "L'Paradoxe", subtitle: "Apparente contradiction", definition: "Affirmation apparemment fausse ou contradictoire mais contenant une vérité.", role: "Invite à la réflexion, attire l'attention, exprime des nuances complexes", examples: ["Moins on parle, plus on pense", "Il faut mourir pour vivre", "Plus on vieillit, plus jeune on devient"], section: "21-40", icon: "🤔" },

            { num: 30, title: "Le Paradoxisme", subtitle: "Succession de paradoxes", definition: "Succession de paradoxes créant une philosophie particulière.", role: "Crée une réflexion profonde, attire l'attention, suscite l'intérêt", examples: ["La mort donne la vie, la nuit éclaire, le silence parle", "Gagner en perdant, réussir en échouant", "Trouver la force dans la faiblesse"], section: "21-40", icon: "🌀" },
            { num: 31, title: "L'Antanaclase", subtitle: "Répétition avec changement de sens", definition: "Répétition d'un mot avec un changement de sens d'une occurrence à l'autre.", role: "Crée un effet d'humour, joue sur les mots, enrichit l'expression", examples: ["La charité plaît aux riches, qui est de la charité", "Le prince charmant n'était pas charmant", "L'arme secrète était une arme à feu secret"], section: "21-40", icon: "🔄" },
            { num: 32, title: "Le Calembour", subtitle: "Jeu de mots", definition: "Jeu de mots basé sur la ressemblance de sons ou de sens.", role: "Crée de l'humour, amuse par la surprise, enrichit l'expression", examples: ["Un pasteur avec ses fidèles moutonnaient", "Lion passer l'arme au pied", "Assurance vous donne satisfaction"], section: "21-40", icon: "😄" },

        ];

        let currentFilter = 'all';

        function renderFigures(figures) {
            const grid = document.getElementById('figuresGrid');
            grid.innerHTML = '';

            figures.forEach(fig => {
                const card = document.createElement('div');
                card.className = 'figure-card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-num">Figure ${fig.num}</div>
                        <h3 class="card-title">${fig.title}</h3>
                        <div class="card-subtitle">${fig.subtitle}</div>
                    </div>
                    <div class="card-body">
                        <div class="illustration">${fig.icon}</div>
                        <div class="definition"><strong>Définition:</strong><br>${fig.definition}</div>
                        <div class="role-section">
                            <div class="role-title">🎯 Rôle et Fonction:</div>
                            <div class="role-text">${fig.role}</div>
                        </div>
                        <div class="examples-section">
                            <div class="examples-title">📌 Trois Exemples:</div>
                            ${fig.examples.map((ex, idx) => `<div class="example">${idx + 1}. ${ex}</div>`).join('')}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Mettre à jour les stats
            const stats = document.getElementById('stats');
            stats.textContent = `Affichage de ${figures.length} figure${figures.length > 1 ? 's' : ''}`;
        }

        function filterBySection(section) {
            currentFilter = section;

            // Mettre à jour les boutons actifs
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Filtrer les figures
            let filtered = allFigures;
            if (section !== 'all') {
                filtered = allFigures.filter(fig => fig.section === section);
            }

            renderFigures(filtered);
        }

        document.getElementById('searchInput').addEventListener('keyup', function(e) {
            const query = e.target.value.toLowerCase();

            if (query === '') {
                filterBySection(currentFilter);
                return;
            }

            let filtered = allFigures.filter(fig => 
                fig.title.toLowerCase().includes(query) ||
                fig.definition.toLowerCase().includes(query) ||
                fig.examples.some(ex => ex.toLowerCase().includes(query))
            );

            renderFigures(filtered);
        });

        // Rendu initial
        renderFigures(allFigures);
    </script>
